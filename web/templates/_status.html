<!-- HTMX partial: Status — kept for API compatibility, no longer shown in main layout -->
{% if s.current_card_id %}
<div class="text-sm text-slate-400">
    <span class="font-mono text-white">{{ s.current_card_id }}</span>
    &middot; {{ s.current_workflow }}/{{ s.current_version }}
    &middot; loop: {{ s.current_loop_id }}
</div>
{% else %}
<div class="text-sm text-slate-500 italic">No active card</div>
{% endif %}
